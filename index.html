<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>movie-tracker</title>
    <style>
        /* Modern Dark Theme (IMDb/Letterboxd Style) */
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --accent-color: #f5c518; /* IMDb Yellow */
            --text-main: #ffffff;
            --text-sub: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2e37;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        header h1 span {
            color: var(--accent-color);
        }

        /* Authentication Overlay Screen */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #2a2e37;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #2a2e37;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            color: var(--text-sub);
            font-weight: bold;
        }

        .auth-tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-switch-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-sub);
            cursor: pointer;
        }

        /* Stats Tracker Box */
        .stats-container {
            background: linear-gradient(135deg, #1e2330, #1a1d24);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #2a2e37;
            text-align: center;
        }

        .stats-container h2 {
            font-size: 16px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin-top: 5px;
        }

        /* Form Controls */
        .input-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-sub);
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: #0f1115;
            border: 1px solid #343a46;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Movie Grid Layout */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .movie-card {
            position: relative;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 1px solid #2a2e37;
        }

        .movie-poster-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #2a2e37;
        }

        .poster-placeholder {
            width: 100%;
            height: 200px;
            background-color: #2a2e37;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .movie-rating {
            font-size: 13px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Delete button style */
        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 10;
        }

        /* Logout Top Layout Button */
        .logout-link {
            font-size: 14px;
            color: var(--text-sub);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 20px; font-size: 24px;">movie-<span>tracker</span></h2>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchAuthMode('login')">Log In</div>
                <div class="auth-tab" id="tabSignup" onclick="switchAuthMode('signup')">Sign Up</div>
            </div>

            <div class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button onclick="handleAuth('login')">Enter Vault</button>
            </div>

            <div class="auth-form" id="signupForm">
                <div class="form-group">
                    <label>Create Email Address</label>
                    <input type="email" id="signupEmail" placeholder="name@email.com">
                </div>
                <div class="form-group">
                    <label>Create Secure Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                <button onclick="handleAuth('signup')">Create Account</button>
            </div>
        </div>
    </div>

    <header>
        <h1>movie-<span>tracker</span></h1>
        <div class="logout-link" onclick="logoutUser()">Log Out</div>
    </header>

    <div class="stats-container">
        <h2>Movies Watched This Year</h2>
        <div class="counter" id="movie-count">0</div>
    </div>

    <div class="input-section">
        <div class="form-group">
            <label for="title">Movie Title</label>
            <input type="text" id="title" placeholder="e.g., Interstellar">
        </div>
        <div class="form-group">
            <label for="rating">Your Rating</label>
            <select id="rating">
                <option value="⭐ 1/5">⭐ 1/5</option>
                <option value="⭐⭐ 2/5">⭐⭐ 2/5</option>
                <option value="⭐⭐⭐ 3/5">⭐⭐⭐ 3/5</option>
                <option value="⭐⭐⭐⭐ 4/5">⭐⭐⭐⭐ 4/5</option>
                <option value="⭐⭐⭐⭐⭐ 5/5" selected>⭐⭐⭐⭐⭐ 5/5</option>
            </select>
        </div>
        <button onclick="addMovie()">Mark as Watched</button>
    </div>

    <h2 style="margin-bottom: 15px; font-size: 18px; color: var(--text-sub);">Your Watch History</h2>
    <div class="movie-grid" id="movie-grid"></div>

    <script>
        // TMDb API Setup (Using an official system fallback database endpoint)
        const TMDB_API_KEY = "15d2ea6d0dc1d476efbca3eba2b9a775"; 
        
        // Load data stores
        let usersDB = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        let currentUser = localStorage.getItem('activeSessionUser') || null;
        let myMovies = JSON.parse(localStorage.getItem('savedMovies')) || [];

        // App Initializer Setup
        checkUserSession();

        // Account / Authentication View Controller
        function switchAuthMode(mode) {
            if (mode === 'login') {
                document.getElementById('tabLogin').className = 'auth-tab active';
                document.getElementById('tabSignup').className = 'auth-tab';
                document.getElementById('loginForm').className = 'auth-form active';
                document.getElementById('signupForm').className = 'auth-form';
            } else {
                document.getElementById('tabLogin').className = 'auth-tab';
                document.getElementById('tabSignup').className = 'auth-tab active';
                document.getElementById('loginForm').className = 'auth-form';
                document.getElementById('signupForm').className = 'auth-form active';
            }
        }

        function handleAuth(type) {
            if (type === 'signup') {
                const email = document.getElementById('signupEmail').value.trim();
                const pass = document.getElementById('signupPassword').value.trim();
                
                if(!email || !pass) { alert("Please fill in all account fields!"); return; }
                if(usersDB.some(user => user.email === email)) { alert("Email already exists!"); return; }
                
                usersDB.push({ email: email, password: pass });
                localStorage.setItem('registeredUsers', JSON.stringify(usersDB));
                currentUser = email;
                localStorage.setItem('activeSessionUser', currentUser);
                
            } else {
                const email = document.getElementById('loginEmail').value.trim();
                const pass = document.getElementById('loginPassword').value.trim();
                
                const validUser = usersDB.find(user => user.email === email && user.password === pass);
                if (!validUser) { alert("Invalid email credentials or password!"); return; }
                
                currentUser = email;
                localStorage.setItem('activeSessionUser', currentUser);
            }
            checkUserSession();
        }

        function checkUserSession() {
            if (currentUser) {
                document.getElementById('authOverlay').style.display = 'none';
                updateUI();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        }

        function logoutUser() {
            localStorage.removeItem('activeSessionUser');
            currentUser = null;
            checkUserSession();
        }

        // Core App Logic & TMDb Poster Search Pipeline
        async function addMovie() {
            const titleInput = document.getElementById('title');
            const ratingInput = document.getElementById('rating');
            const targetTitle = titleInput.value.trim();

            if (targetTitle === "") {
                alert("Please enter a movie title!");
                return;
            }

            let posterUrl = "";
            let verifiedTitle = targetTitle;

            // Fetch live data directly from global TMDb cluster
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(targetTitle)}`);
                const data = await response.json();
                
                if(data.results && data.results.length > 0) {
                    const bestMatch = data.results[0];
                    verifiedTitle = bestMatch.title; // Auto-corrects typo inputs
                    if(bestMatch.poster_path) {
                        posterUrl = `https://image.tmdb.org/t/p/w500${bestMatch.poster_path}`;
                    }
                }
            } catch (err) {
                console.log("Network disconnect, defaulting to fallback assets...", err);
            }

            const newMovie = {
                id: Date.now(),
                userOwner: currentUser, // Chains records cleanly to this logged-in space
                title: verifiedTitle,
                rating: ratingInput.value,
                poster: posterUrl
            };

            myMovies.push(newMovie);
            localStorage.setItem('savedMovies', JSON.stringify(myMovies));
            
            titleInput.value = "";
            updateUI();
        }

        function deleteMovie(id) {
            myMovies = myMovies.filter(movie => movie.id !== id);
            localStorage.setItem('savedMovies', JSON.stringify(myMovies));
            updateUI();
        }

        function updateUI() {
            const grid = document.getElementById('movie-grid');
            const counter = document.getElementById('movie-count');
            
            grid.innerHTML = "";
            
            // Isolates data layers dynamically so users only track their private logs
            const filteredMovies = myMovies.filter(movie => movie.userOwner === currentUser);
            counter.innerText = filteredMovies.length;

            filteredMovies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                // Smart UI Selector: Renders raw artwork asset, or falls back to custom emoji template
                const mediaComponent = movie.poster 
                    ? `<img class="movie-poster-img" src="${movie.poster}" alt="${movie.title}">`
                    : `<div class="poster-placeholder">🎬<br>${movie.title}</div>`;

                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteMovie(${movie.id})">✕</button>
                    ${mediaComponent}
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-rating">${movie.rating}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
